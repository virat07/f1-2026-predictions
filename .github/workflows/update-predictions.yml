name: F1 Auto-Sync & Retrain

on:
  schedule:
    - cron: '0 14 * * 0'
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      force_retrain:
        description: 'Force model retrain even if no new data'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  sync_results:
    name: Sync Race Results
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install supabase
      - name: Run sync script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python sync_results.py

  retrain_and_export:
    name: Retrain ML Models & Export Predictions
    runs-on: ubuntu-latest
    needs: sync_results
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cache FastF1 data
        uses: actions/cache@v4
        with:
          path: ml/processed/fastf1_cache
          key: fastf1-${{ runner.os }}-${{ hashFiles('ml/config.py') }}-${{ github.run_id }}
          restore-keys: |
            fastf1-${{ runner.os }}-${{ hashFiles('ml/config.py') }}-
            fastf1-${{ runner.os }}-

      - name: Cache trained models
        id: model-cache
        uses: actions/cache@v4
        with:
          path: ml/models
          key: models-${{ runner.os }}-${{ hashFiles('ml/config.py', 'ml/features/features.py', 'ml/train.py') }}-${{ github.run_number }}
          restore-keys: |
            models-${{ runner.os }}-${{ hashFiles('ml/config.py', 'ml/features/features.py', 'ml/train.py') }}-

      - name: Install ML dependencies
        run: pip install -r ml/requirements.txt

      - name: Scrape F1 news sentiment
        run: python -m ml.scrape_news
        continue-on-error: true

      - name: Train models
        if: steps.model-cache.outputs.cache-hit != 'true' || github.event.inputs.force_retrain == 'true'
        run: python -m ml.train

      - name: Debug model files
        run: |
          echo "=== ml/models contents ==="
          ls -la ml/models/ || echo "ml/models/ does not exist"
          echo "=== all joblib files ==="
          find ml/ -name "*.joblib" 2>/dev/null || echo "no joblib files found anywhere"
          echo "=== cache hit ==="
          echo "cache-hit: ${{ steps.model-cache.outputs.cache-hit }}"

      - name: Export predictions to JSON
        run: python -m ml.export_predictions

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/ml-predictions.json
          git add -f ml/models/race_winner.joblib
          git add -f ml/models/podium.joblib
          git add -f ml/models/driver_standings.joblib
          git add -f ml/models/constructor_standings.joblib
          git diff --cached --quiet || (
            git pull --rebase origin ${{ github.ref_name }} &&
            git commit -m "chore: update ML predictions [skip ci]" &&
            git push
          )