name: Update Predictions

on:
  schedule:
    # Runs every Monday at 08:00 UTC (after typical race weekends)
    - cron: '0 8 * * 1'
  workflow_dispatch: # Allows you to manually trigger the workflow from the GitHub UI

permissions:
  contents: write

jobs:
  update-ml-predictions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # cache pip dependencies

      - name: Cache FastF1 data
        uses: actions/cache@v4
        with:
          path: ~/.fastf1-cache
          key: fastf1-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            fastf1-cache-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml/requirements.txt

      - name: Run prediction scripts
        run: |
          python -m ml.scrape_news
          python -m ml.train
          python -m ml.export_predictions

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/ml-predictions.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: Update ML predictions after race" && git push)
